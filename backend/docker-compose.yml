version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: openhood_mysql
    restart: always
    environment:
      MYSQL_DATABASE: openhood_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_openhood
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: openhood_pma
    restart: always
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"

volumes:
  db_data: